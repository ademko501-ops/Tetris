<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>TETRIS VAULT-TEC</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>TETRIS VAULT-TEC</h1>

  <!-- Обёртка-флексбокс: слева игровое поле, справа табло (R-10).
       На этапах R-1..R-9 поле было прямо в body; в R-10 появилась
       панель счёта, и удобнее, чтобы они стояли в строку. -->
  <div id="game-wrapper">

    <!-- Игровое поле: пустой контейнер.
         Клетки внутрь добавляет JavaScript (см. game.js → drawBoard). -->
    <div id="game-board"></div>

    <!-- Экран Game Over (R-11). При старте скрыт через атрибут hidden;
         JS показывает его при триггере (triggerGameOver) и снова прячет
         при рестарте (resetGame, клавиша R). Размеры в CSS заданы такими
         же, как у поля, — чтобы layout не прыгал при swap. -->
    <div id="game-over-screen" hidden>
      <div class="game-over-title">GAME OVER</div>
      <div class="game-over-score-row">
        <div class="game-over-score-label">SCORE</div>
        <div class="game-over-score-value" id="game-over-score-value">0</div>
      </div>
      <div class="game-over-hint">PRESS R TO RESTART</div>
    </div>

    <!-- Табло SCORE / LEVEL / LINES / BEST (R-10 + BEST в R-11).
         Значения обновляет drawScorePanel() из game.js.
         BEST читается из localStorage при старте и обновляется на
         Game Over, если текущий счёт побил рекорд.
         Стартовые "0" в HTML — чтобы при загрузке страницы
         (до выполнения JS) пользователь не видел пустые места. -->
    <aside id="score-panel">
      <div class="panel-row">
        <div class="panel-label">SCORE</div>
        <div class="panel-value" id="score-value">0</div>
      </div>
      <div class="panel-row">
        <div class="panel-label">LEVEL</div>
        <div class="panel-value" id="level-value">0</div>
      </div>
      <div class="panel-row">
        <div class="panel-label">LINES</div>
        <div class="panel-value" id="lines-value">0</div>
      </div>
      <div class="panel-row">
        <div class="panel-label">BEST</div>
        <div class="panel-value" id="best-value">0</div>
      </div>
    </aside>

  </div>

  <script src="game.js"></script>
</body>
</html>
